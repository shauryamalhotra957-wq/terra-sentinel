name: Feature request
description: Propose a concrete improvement or new capability.
title: "[Feature]: "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Clear use cases help evaluate scope and trade-offs.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need or limitation should be addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior, including an example when useful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you considered?
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits, and how would success be measured?
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for a similar request.
          required: true
        - label: This request does not contain secrets or personal data.
          required: true
