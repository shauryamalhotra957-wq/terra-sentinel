name: Bug report
description: Report reproducible behavior that is not working as expected.
title: "[Bug]: "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please remove secrets and personal data before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: Describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that reproduces the issue.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant OS, runtime, browser, board, dependency, model, or hardware versions.
      placeholder: Windows 11, Python 3.11, Node.js 22, Arduino Uno...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste concise logs or attach screenshots. Redact secrets and personal data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: I removed secrets and personal data from this report.
          required: true
